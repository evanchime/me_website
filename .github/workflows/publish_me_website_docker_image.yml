name: Django CI/CD with Pytest

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write      # Required for pushing to Docker Hub/GHCR
  attestations: write  # Required for generating SLSA attestations
  id-token: write      # Required for OIDC authentication with AWS

jobs:
  test:
    name: Run Test Suite
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r me_website_project/requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run tests with pytest
        working-directory: ./me_website_project
        run: |
          pytest --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./me_website_project/coverage.xml
          flags: unittests
          name: codecov-umbrella

  build-and-test-docker:
    name: Build and Test Docker Image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Test Image and Run Container Tests
        run: |
            # Define the image tag as a shell variable
            IMAGE_TAG="local/me-website:test"

            # Define file paths for clarity
            DOCKER_IGNORE="me_website_project/.dockerignore"
            DOCKER_IGNORE_TEST="me_website_project/.dockerignore.test"
            DOCKER_IGNORE_BACKUP="me_website_project/.dockerignore.bak"

            echo "Swapping .dockerignore for test build..."
            mv "$DOCKER_IGNORE" "$DOCKER_IGNORE_BACKUP"
            mv "$DOCKER_IGNORE_TEST" "$DOCKER_IGNORE"

            echo "Building the test image with tag: $IMAGE_TAG"
            docker buildx build \
            --target test \
            --tag "$IMAGE_TAG" \
            --load \
            --cache-to type=gha,mode=max \
            --cache-from type=gha \
            ./me_website_project

            echo "Restoring original .dockerignore files..."
            mv "$DOCKER_IGNORE" "$DOCKER_IGNORE_TEST"
            mv "$DOCKER_IGNORE_BACKUP" "$DOCKER_IGNORE"

            echo "Running tests inside the container with tag: $IMAGE_TAG"
            docker run \
            --rm \
            --entrypoint "" \
            "$IMAGE_TAG" \
            pytest

  push-to-registries:
    name: Push to ECR and Docker Hub with Attestation
    needs: build-and-test-docker
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Extract metadata for Docker
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: |
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY_NAME }}
            tags: |
              type=semver,pattern=v{{version}}
              type=semver,pattern=v{{major}}.{{minor}}
              type=sha,format=short
              type=raw,value=latest,enable={{is_default_branch}}

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::661510969671:role/GitHubActions-ECR-Role
            aws-region: ${{ secrets.AWS_REGION }}

        - name: Login to Amazon ECR
          uses: aws-actions/amazon-ecr-login@v2

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build image for scanning
          uses: docker/build-push-action@v5
          with:
            context: ./me_website_project
            target: production
            load: true
            push: false
            tags: me-website-scan:latest # A temporary, predictable tag
            cache-from: type=gha
            cache-to: type=gha,mode=max

        - name: Scan local image with Amazon Inspector
          uses: aws-actions/vulnerability-scan-github-action-for-amazon-inspector@v1
          id: inspector-scan 
          with:
            artifact_type: 'container'
            artifact_path: 'me-website-scan:latest'
            critical_threshold: 1
            high_threshold: 1
            # Set the others to a high number as I don't care about them
            medium_threshold: 999
            low_threshold: 999
            other_threshold: 999

        - name: Check vulnerability thresholds
          if: always()
          run: |
            echo "Scan complete. Checking thresholds..."
            VULNERABILITY_THRESHOLD_EXCEEDED=${{ steps.inspector-scan.outputs.vulnerability_threshold_exceeded }}
            echo "Vulnerability threshold exceeded: $VULNERABILITY_THRESHOLD_EXCEEDED"
            if [[ "$VULNERABILITY_THRESHOLD_EXCEEDED" == "1" ]]; then
                echo "::error::Vulnerability threshold exceeded. Failing the build."
                exit 1
            else
                echo "Vulnerability thresholds not exceeded. Proceeding."
            fi

        - name: Upload vulnerability scan results
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: inspector-scan-results
            path: |
                *.csv
                *.md

        - name: Push image to registries
          uses: docker/build-push-action@v5
          with:
            context: ./me_website_project
            target: production
            push: true
            tags: ${{ steps.meta.outputs.tags }} 
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha # Use the cache from the scan-build step
